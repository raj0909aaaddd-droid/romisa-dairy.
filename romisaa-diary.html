<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Romisaa — My Heart's Private Pages</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Dancing+Script:wght@400;500;600;700&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --petal-pink: #f9c0cb;
    --deep-rose: #c0556e;
    --blush: #fde8ee;
    --cream: #fdf6f0;
    --gold: #c9a96e;
    --gold-light: #e8d5a3;
    --ink: #2c1a1a;
    --shadow: rgba(120, 40, 60, 0.18);
    --page-shadow: rgba(80, 20, 30, 0.22);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
    background: #0d0508;
    cursor: default;
  }

  /* ─── CANVAS BEHIND EVERYTHING ─── */
  #bgCanvas {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* ─── OVERLAY GRADIENT ─── */
  #bgOverlay {
    position: fixed; inset: 0;
    z-index: 1;
    background:
      radial-gradient(ellipse 80% 60% at 50% 30%, rgba(30,5,10,0.0) 0%, rgba(10,2,5,0.55) 100%),
      linear-gradient(180deg, rgba(10,2,5,0.3) 0%, rgba(10,2,5,0.0) 40%, rgba(10,2,5,0.5) 100%);
    pointer-events: none;
  }

  /* ─── ENTER SCREEN ─── */
  #enterScreen {
    position: fixed; inset: 0;
    z-index: 200;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: transparent;
    transition: opacity 1.8s ease, transform 1.8s ease;
  }

  #enterScreen.fade-out {
    opacity: 0;
    transform: scale(1.06);
    pointer-events: none;
  }

  .enter-diary-wrap {
    perspective: 1800px;
    perspective-origin: 50% 45%;
  }

  .enter-diary {
    width: min(340px, 80vw);
    height: min(440px, 70vh);
    position: relative;
    transform-style: preserve-3d;
    transform: rotateY(-22deg) rotateX(8deg) translateZ(0px);
    animation: floatDiary 5s ease-in-out infinite;
    filter: drop-shadow(0 60px 80px rgba(180,80,100,0.45)) drop-shadow(0 20px 30px rgba(0,0,0,0.7));
    cursor: pointer;
    transition: transform 0.4s ease, filter 0.4s ease;
  }

  .enter-diary:hover {
    transform: rotateY(-10deg) rotateX(5deg) translateZ(30px);
    filter: drop-shadow(0 70px 100px rgba(200,90,120,0.55)) drop-shadow(0 30px 40px rgba(0,0,0,0.7));
  }

  @keyframes floatDiary {
    0%, 100% { transform: rotateY(-22deg) rotateX(8deg) translateY(0px); }
    50% { transform: rotateY(-18deg) rotateX(5deg) translateY(-14px); }
  }

  .diary-cover-front, .diary-cover-back, .diary-spine {
    position: absolute;
    border-radius: 6px 14px 14px 6px;
    backface-visibility: hidden;
  }

  .diary-cover-front {
    inset: 0;
    background: linear-gradient(135deg, #8b1a2e 0%, #6b0e20 20%, #a0243c 45%, #7a1428 70%, #5c0d1c 100%);
    border-radius: 6px 14px 14px 6px;
    box-shadow: inset -4px 0 12px rgba(0,0,0,0.4), inset 2px 2px 8px rgba(255,180,180,0.08);
    overflow: hidden;
  }

  .diary-cover-front::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent 0px, transparent 3px,
      rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px
    );
    border-radius: inherit;
  }

  .diary-cover-front::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 50%, rgba(0,0,0,0.2) 100%);
    border-radius: inherit;
  }

  .diary-spine {
    left: 0; top: 6px; bottom: 6px;
    width: 28px;
    background: linear-gradient(90deg, #3a0510 0%, #5c0d1c 40%, #3a0510 100%);
    border-radius: 6px 0 0 6px;
    transform: translateX(-24px) rotateY(90deg);
    transform-origin: right center;
    box-shadow: -4px 0 12px rgba(0,0,0,0.6);
  }

  .diary-pages {
    position: absolute;
    top: 8px; bottom: 8px; left: 6px; right: -3px;
    background: linear-gradient(90deg,
      #e8d5c0 0%, #f5ece0 30%, #fdf6f0 70%, #f0e6d0 100%
    );
    border-radius: 2px 12px 12px 2px;
    box-shadow: 2px 0 8px rgba(0,0,0,0.3);
  }

  .diary-pages::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      180deg,
      transparent 0px, transparent 11px,
      rgba(180,120,80,0.15) 11px, rgba(180,120,80,0.15) 12px
    );
    border-radius: inherit;
  }

  /* Cover embellishments */
  .cover-ornament {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 85%;
    text-align: center;
    z-index: 2;
  }

  .cover-border {
    position: absolute;
    top: 16px; left: 16px; right: 16px; bottom: 16px;
    border: 1.5px solid rgba(201,169,110,0.5);
    border-radius: 4px 12px 12px 4px;
    z-index: 2;
  }

  .cover-border::before {
    content: '';
    position: absolute;
    top: 5px; left: 5px; right: 5px; bottom: 5px;
    border: 0.5px solid rgba(201,169,110,0.25);
    border-radius: 3px 11px 11px 3px;
  }

  .cover-title {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 4px;
    color: rgba(201,169,110,0.85);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .cover-name {
    font-family: 'Dancing Script', cursive;
    font-size: 46px;
    font-weight: 700;
    color: #e8c88a;
    line-height: 1.1;
    text-shadow: 0 2px 20px rgba(201,169,110,0.6), 0 0 40px rgba(201,169,110,0.3);
  }

  .cover-heart {
    font-size: 28px;
    margin: 10px 0;
    display: block;
    animation: heartbeat 1.8s ease-in-out infinite;
    filter: drop-shadow(0 0 12px rgba(255,120,140,0.8));
  }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    15% { transform: scale(1.22); }
    30% { transform: scale(1); }
    45% { transform: scale(1.12); }
    60% { transform: scale(1); }
  }

  .cover-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    color: rgba(232,200,138,0.65);
    letter-spacing: 1px;
    margin-top: 6px;
  }

  /* Gold corner ornaments */
  .corner-ornament {
    position: absolute;
    width: 32px; height: 32px;
    z-index: 3;
  }
  .corner-ornament svg { width: 100%; height: 100%; }
  .co-tl { top: 22px; left: 22px; }
  .co-tr { top: 22px; right: 22px; transform: scaleX(-1); }
  .co-bl { bottom: 22px; left: 22px; transform: scaleY(-1); }
  .co-br { bottom: 22px; right: 22px; transform: scale(-1); }

  /* lock clasp */
  .diary-clasp {
    position: absolute;
    right: -10px; top: 50%;
    transform: translateY(-50%);
    width: 18px; height: 28px;
    background: linear-gradient(180deg, #d4af5a 0%, #a07830 100%);
    border-radius: 3px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,220,120,0.4);
    z-index: 5;
    display: flex; align-items: center; justify-content: center;
  }

  .diary-clasp::before {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #7a5010;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
  }

  /* Enter button */
  .enter-label {
    margin-top: 38px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 17px;
    color: rgba(232,200,170,0.75);
    letter-spacing: 3px;
    animation: breathe 2.5s ease-in-out infinite;
    text-shadow: 0 0 20px rgba(232,200,170,0.4);
    user-select: none;
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.55; transform: translateY(0); }
    50% { opacity: 1; transform: translateY(-3px); }
  }

  /* ─── MAIN DIARY SCENE ─── */
  #diaryScene {
    position: fixed; inset: 0;
    z-index: 10;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.5s ease 0.3s;
  }

  #diaryScene.visible {
    opacity: 1;
    pointer-events: all;
  }

  /* ─── NOTEBOOK ─── */
  .notebook-wrap {
    perspective: 2200px;
    perspective-origin: 50% 48%;
  }

  .notebook {
    position: relative;
    width: min(760px, 94vw);
    height: min(520px, 76vh);
    transform-style: preserve-3d;
  }

  /* Pages stack */
  .page-stack-bg {
    position: absolute;
    inset: 0;
    border-radius: 6px 18px 18px 6px;
    background: linear-gradient(90deg, #d4b896 0%, #ecdec8 30%, #fdf6f0 100%);
    transform: translateZ(-2px);
    box-shadow: 0 40px 100px rgba(80,20,30,0.45), 0 10px 30px rgba(0,0,0,0.4);
  }

  /* The pages container — 3D flip book */
  #bookContainer {
    position: absolute; inset: 0;
    transform-style: preserve-3d;
  }

  .book-page {
    position: absolute;
    inset: 0;
    transform-origin: left center;
    transform-style: preserve-3d;
    transition: transform 0.9s cubic-bezier(0.645, 0.045, 0.355, 1.000);
    z-index: 1;
  }

  .book-page.flipped {
    transform: rotateY(-180deg);
  }

  .page-front, .page-back {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 6px 18px 18px 6px;
    overflow: hidden;
  }

  .page-back {
    transform: rotateY(180deg);
    border-radius: 18px 6px 6px 18px;
  }

  /* Page texture */
  .page-texture {
    width: 100%; height: 100%;
    background: linear-gradient(135deg,
      #fdf8f2 0%, #fef9f4 30%, #fdf6ef 60%, #faf3ec 100%
    );
    position: relative;
    overflow: hidden;
  }

  .page-texture::before {
    content: '';
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(
        180deg,
        transparent 0px, transparent 29px,
        rgba(180,150,120,0.18) 29px, rgba(180,150,120,0.18) 30px
      );
  }

  /* Red margin line */
  .page-texture::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    left: 72px;
    width: 1.5px;
    background: rgba(220,90,100,0.35);
  }

  .page-back .page-texture::after {
    left: auto;
    right: 72px;
  }

  /* Spiral binding */
  .spiral {
    position: absolute;
    left: -14px; top: 0; bottom: 0;
    width: 28px;
    z-index: 50;
    display: flex; flex-direction: column;
    align-items: center;
    justify-content: space-evenly;
    padding: 18px 0;
    pointer-events: none;
  }

  .spiral-ring {
    width: 22px; height: 18px;
    border: 3px solid #8a7060;
    border-radius: 50%;
    background: linear-gradient(135deg, #c4a882 0%, #8a6040 100%);
    box-shadow: 0 2px 6px rgba(0,0,0,0.4), inset 0 1px 2px rgba(255,200,150,0.3);
    flex-shrink: 0;
  }

  /* ─── PAGE CONTENT ─── */
  .page-content {
    position: absolute;
    top: 14px; left: 88px; right: 28px; bottom: 60px;
    display: flex; flex-direction: column;
    gap: 0;
  }

  .page-back .page-content {
    left: 28px; right: 88px;
  }

  .page-number {
    position: absolute;
    bottom: 20px; right: 32px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    color: rgba(140,80,80,0.5);
    font-style: italic;
  }

  .page-back .page-number {
    right: auto; left: 32px;
  }

  /* date stamp */
  .page-date {
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    color: rgba(160,100,90,0.65);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* headings */
  .page-heading {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(24px, 4vw, 36px);
    font-weight: 700;
    color: #6b1a28;
    line-height: 1.15;
    margin-bottom: 14px;
    text-shadow: 1px 1px 3px rgba(180,80,100,0.15);
  }

  /* body text */
  .page-body {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(14px, 1.6vw, 17px);
    font-weight: 400;
    color: #2c1a1a;
    line-height: 30px; /* matches line-height of ruled lines */
    flex: 1;
  }

  .page-body em {
    font-style: italic;
    color: #8b2a3a;
  }

  .page-body strong {
    font-weight: 600;
    color: #5c1020;
  }

  /* decorative ink flourish */
  .ink-flourish {
    position: absolute;
    opacity: 0.12;
    pointer-events: none;
  }

  /* small pressed flower */
  .pressed-flower {
    position: absolute;
    font-size: 36px;
    opacity: 0.22;
    pointer-events: none;
    transform: rotate(-18deg);
    filter: sepia(0.6);
  }

  /* Wax seal */
  .wax-seal {
    position: absolute;
    bottom: 28px; right: 26px;
    width: 56px; height: 56px;
    background: radial-gradient(circle at 40% 35%, #d44060, #8b0020);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(180,40,60,0.5), inset 0 -2px 6px rgba(0,0,0,0.3), inset 0 2px 4px rgba(255,150,150,0.2);
    font-size: 20px;
    transform: rotate(-12deg);
  }

  /* ─── COVER PAGE (page 0) ─── */
  .cover-page-content {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: linear-gradient(160deg, #6b0e20 0%, #8b1a2e 35%, #a0243c 55%, #7a1428 80%, #5c0d1c 100%);
    border-radius: 6px 18px 18px 6px;
    overflow: hidden;
  }

  .cover-page-content::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent, transparent 2.5px,
      rgba(0,0,0,0.03) 2.5px, rgba(0,0,0,0.03) 3px
    );
  }

  .cover-page-content::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 50%, rgba(0,0,0,0.15) 100%);
  }

  .cover-inner-border {
    position: absolute;
    top: 18px; left: 18px; right: 18px; bottom: 18px;
    border: 1px solid rgba(201,169,110,0.4);
    border-radius: 4px 16px 16px 4px;
    pointer-events: none;
    z-index: 2;
  }

  .cover-inner-border::before {
    content: '';
    position: absolute;
    top: 6px; left: 6px; right: 6px; bottom: 6px;
    border: 0.5px solid rgba(201,169,110,0.2);
    border-radius: 3px 14px 14px 3px;
  }

  .cover-text-block {
    position: relative; z-index: 3;
    text-align: center;
    padding: 20px;
  }

  .cp-eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 5px;
    color: rgba(201,169,110,0.7);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .cp-title {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(38px, 7vw, 62px);
    font-weight: 700;
    color: #e8c88a;
    text-shadow: 0 2px 30px rgba(201,169,110,0.5), 0 0 60px rgba(201,169,110,0.2);
    line-height: 1.05;
    margin-bottom: 6px;
  }

  .cp-heart-line {
    font-size: 22px;
    margin: 12px 0;
    display: block;
    animation: heartbeat 1.8s ease-in-out infinite;
    filter: drop-shadow(0 0 10px rgba(255,120,140,0.8));
  }

  .cp-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 15px;
    color: rgba(232,200,138,0.7);
    letter-spacing: 1.5px;
    line-height: 1.7;
    max-width: 320px;
    margin: 0 auto;
  }

  /* ─── TAP ZONES ─── */
  .tap-zone {
    position: fixed;
    top: 0; bottom: 0;
    width: 50%;
    z-index: 50;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .tap-zone.active { pointer-events: all; }

  #tapLeft  { left: 0; }
  #tapRight { right: 0; }

  /* ripple hint on tap */
  .tap-ripple {
    position: fixed;
    width: 80px; height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,169,110,0.45), transparent 70%);
    transform: translate(-50%, -50%) scale(0);
    pointer-events: none;
    z-index: 200;
    animation: rippleOut 0.55s ease forwards;
  }
  @keyframes rippleOut {
    0%   { transform: translate(-50%,-50%) scale(0); opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(2.8); opacity: 0; }
  }

  /* page indicator — small floating pill */
  #pageIndicatorPill {
    position: fixed;
    bottom: 30px; left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
    color: rgba(232,200,138,0.75);
    letter-spacing: 2px;
    background: rgba(10,2,5,0.5);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(201,169,110,0.2);
    border-radius: 40px;
    padding: 7px 22px;
    opacity: 0;
    transition: opacity 0.8s ease 1.2s;
    pointer-events: none;
  }
  #pageIndicatorPill.visible { opacity: 1; }

  /* subtle arrow hints on sides */
  .side-hint {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    z-index: 60;
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    color: rgba(201,169,110,0.28);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.8s ease 1.5s;
    user-select: none;
  }
  .side-hint.visible { opacity: 1; }
  #hintLeft  { left: 18px; }
  #hintRight { right: 18px; }

  /* ─── MUSIC TOGGLE ─── */
  #musicToggle {
    position: fixed;
    top: 28px; right: 32px;
    z-index: 200;
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 1px solid rgba(201,169,110,0.4);
    background: rgba(20,5,10,0.55);
    backdrop-filter: blur(10px);
    color: #e8c88a;
    font-size: 18px;
    cursor: pointer;
    display: none;
    align-items: center; justify-content: center;
    transition: all 0.3s ease;
  }

  #musicToggle:hover {
    background: rgba(201,169,110,0.2);
    border-color: rgba(201,169,110,0.7);
  }

  #musicToggle.shown { display: flex; }

  /* ─── FLIP SOUND VISUAL EFFECT ─── */
  .page-flip-glow {
    position: fixed;
    top: 0; bottom: 0;
    left: 50%;
    width: 3px;
    background: linear-gradient(180deg, transparent, rgba(201,169,110,0.6), transparent);
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    transform: translateX(-50%);
    transition: opacity 0.05s;
  }

  .page-flip-glow.flash {
    opacity: 1;
    animation: glowFlash 0.8s ease forwards;
  }

  @keyframes glowFlash {
    0% { opacity: 0; }
    10% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ─── STICKER DECORATIONS ─── */
  .sticker {
    position: absolute;
    pointer-events: none;
    opacity: 0.7;
    font-size: 22px;
  }

  /* ─── PAGE 1 FLOWER WATERCOLOR ─── */
  .watercolor-bg {
    position: absolute;
    top: 30px; right: 10px;
    width: 130px; height: 130px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(249,192,203,0.35) 0%, rgba(249,192,203,0.1) 60%, transparent 80%);
    pointer-events: none;
  }

  /* ─── ENVELOPE / LETTER in page 5 ─── */
  .letter-envelope {
    position: relative;
    background: linear-gradient(135deg, #fff8f0, #fdf0e0);
    border: 1px solid rgba(180,130,80,0.3);
    border-radius: 4px;
    padding: 16px 20px 20px;
    margin-top: 8px;
    box-shadow: 0 2px 12px rgba(180,100,80,0.12);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 15px;
    color: #3c1a1a;
    line-height: 1.8;
  }

  .letter-envelope::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #c9a96e, #e8d5a3, #c9a96e);
    border-radius: 4px 4px 0 0;
  }
</style>
</head>
<body>

<!-- Background cherry blossom canvas -->
<canvas id="bgCanvas"></canvas>
<div id="bgOverlay"></div>
<div class="page-flip-glow" id="flipGlow"></div>

<!-- Music toggle -->
<button id="musicToggle" title="Toggle music">🎹</button>

<!-- ENTER SCREEN -->
<div id="enterScreen">

<script>
/* ═══════════════════════════════════════════════════════════════
   CHERRY BLOSSOM CANVAS — ULTRA REALISTIC
═══════════════════════════════════════════════════════════════ */
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

/* Night sky gradient */
function drawBg() {
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0,   '#0d0309');
  grad.addColorStop(0.3, '#1a0612');
  grad.addColorStop(0.6, '#220a16');
  grad.addColorStop(1,   '#150408');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

/* Stars */
const stars = Array.from({length: 200}, () => ({
  x: Math.random(),
  y: Math.random() * 0.7,
  r: Math.random() * 1.2 + 0.2,
  a: Math.random(),
  speed: Math.random() * 0.004 + 0.001,
  phase: Math.random() * Math.PI * 2
}));

function drawStars(t) {
  stars.forEach(s => {
    const flicker = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(t * s.speed * 60 + s.phase));
    ctx.beginPath();
    ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,240,255,${flicker * 0.8})`;
    ctx.fill();
  });
}

/* Moon */
function drawMoon() {
  const mx = canvas.width * 0.82, my = canvas.height * 0.14, mr = 42;
  const moonGrad = ctx.createRadialGradient(mx - 8, my - 8, 2, mx, my, mr);
  moonGrad.addColorStop(0, 'rgba(255,245,230,0.98)');
  moonGrad.addColorStop(0.5, 'rgba(255,235,200,0.92)');
  moonGrad.addColorStop(1, 'rgba(240,210,180,0.6)');
  ctx.beginPath();
  ctx.arc(mx, my, mr, 0, Math.PI * 2);
  ctx.fillStyle = moonGrad;
  ctx.fill();
  // glow
  const glowGrad = ctx.createRadialGradient(mx, my, mr, mx, my, mr * 3.5);
  glowGrad.addColorStop(0, 'rgba(255,235,200,0.18)');
  glowGrad.addColorStop(1, 'rgba(255,200,180,0)');
  ctx.beginPath();
  ctx.arc(mx, my, mr * 3.5, 0, Math.PI * 2);
  ctx.fillStyle = glowGrad;
  ctx.fill();
  // craters
  [[mx+8, my+8, 5], [mx-12, my+5, 3], [mx+5, my-14, 4]].forEach(([cx,cy,cr]) => {
    ctx.beginPath();
    ctx.arc(cx, cy, cr, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(210,180,150,0.25)';
    ctx.fill();
  });
}

/* Cherry blossom tree branches */
function drawBranch(x, y, angle, length, depth) {
  if (depth === 0 || length < 6) return;
  const ex = x + Math.cos(angle) * length;
  const ey = y + Math.sin(angle) * length;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(ex, ey);
  ctx.strokeStyle = `rgba(60,20,30,${0.3 + depth * 0.07})`;
  ctx.lineWidth = depth * 0.9;
  ctx.stroke();
  const spread = 0.35 + (5 - depth) * 0.05;
  drawBranch(ex, ey, angle - spread, length * 0.72, depth - 1);
  drawBranch(ex, ey, angle + spread * 0.8, length * 0.68, depth - 1);
  if (depth > 2) drawBranch(ex, ey, angle - spread * 0.3, length * 0.6, depth - 2);
}

function drawTrees() {
  // Left tree
  ctx.save();
  drawBranch(canvas.width * 0.03, canvas.height * 1.05, -Math.PI / 2.2, canvas.height * 0.38, 7);
  // Right tree
  drawBranch(canvas.width * 0.97, canvas.height * 1.05, -Math.PI / 1.85, canvas.height * 0.35, 7);
  ctx.restore();
}

/* Petals */
class Petal {
  constructor(initial) {
    this.reset(initial);
  }
  reset(initial) {
    this.x = Math.random() * canvas.width * 1.2 - canvas.width * 0.1;
    this.y = initial ? Math.random() * canvas.height : -30 - Math.random() * 200;
    this.size = 4 + Math.random() * 8;
    this.speedX = (Math.random() - 0.4) * 1.8;
    this.speedY = 0.6 + Math.random() * 1.4;
    this.rot = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.06;
    this.wobble = Math.random() * Math.PI * 2;
    this.wobbleSpeed = 0.02 + Math.random() * 0.03;
    this.wobbleAmp = 0.8 + Math.random() * 1.4;
    // Petal color — layered pink
    const hue = 340 + Math.random() * 20;
    const sat = 60 + Math.random() * 30;
    const lit = 75 + Math.random() * 18;
    this.color = `hsl(${hue},${sat}%,${lit}%)`;
    this.alpha = 0.55 + Math.random() * 0.4;
    this.depth = 0.4 + Math.random() * 0.6; // parallax depth
  }

  update() {
    this.wobble += this.wobbleSpeed;
    this.x += this.speedX + Math.sin(this.wobble) * this.wobbleAmp * this.depth;
    this.y += this.speedY * this.depth;
    this.rot += this.rotSpeed;
    if (this.y > canvas.height + 40) this.reset(false);
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.globalAlpha = this.alpha * this.depth;

    // Realistic cherry blossom petal shape
    ctx.beginPath();
    // Top petal (rounded teardrop with notch)
    ctx.moveTo(0, -this.size);
    ctx.bezierCurveTo(this.size * 0.8, -this.size * 1.1, this.size * 1.1, 0, 0, this.size * 0.6);
    ctx.bezierCurveTo(-this.size * 1.1, 0, -this.size * 0.8, -this.size * 1.1, 0, -this.size);
    ctx.closePath();

    const pg = ctx.createRadialGradient(0, -this.size * 0.2, 0, 0, 0, this.size * 1.1);
    pg.addColorStop(0, `hsla(350, 80%, 90%, 1)`);
    pg.addColorStop(0.4, this.color);
    pg.addColorStop(1, `hsla(330, 60%, 65%, 0.4)`);
    ctx.fillStyle = pg;
    ctx.fill();

    // Veins
    ctx.strokeStyle = `rgba(220,140,160,0.35)`;
    ctx.lineWidth = 0.4;
    ctx.beginPath();
    ctx.moveTo(0, -this.size * 0.9);
    ctx.lineTo(0, this.size * 0.4);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, -this.size * 0.4);
    ctx.lineTo(this.size * 0.6, 0);
    ctx.moveTo(0, -this.size * 0.4);
    ctx.lineTo(-this.size * 0.6, 0);
    ctx.stroke();

    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

const petals = Array.from({length: 140}, () => new Petal(true));

/* Ground petal drift */
const groundPetals = Array.from({length: 30}, () => ({
  x: Math.random() * canvas.width,
  y: canvas.height - 2 - Math.random() * 4,
  size: 3 + Math.random() * 4,
  rot: Math.random() * Math.PI * 2,
  speed: (Math.random() - 0.5) * 0.5,
  alpha: 0.25 + Math.random() * 0.3
}));

function drawGroundPetals() {
  groundPetals.forEach(p => {
    p.x += p.speed;
    if (p.x < -10) p.x = canvas.width + 10;
    if (p.x > canvas.width + 10) p.x = -10;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.globalAlpha = p.alpha;
    ctx.beginPath();
    ctx.ellipse(0, 0, p.size, p.size * 0.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(249,192,203,1)`;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
  });
}

/* Bloom clusters on branches */
function drawBlossoms() {
  const clusters = [
    // Left tree
    {x: 0.06, y: 0.32}, {x: 0.12, y: 0.18}, {x: 0.18, y: 0.25},
    {x: 0.09, y: 0.42}, {x: 0.22, y: 0.35}, {x: 0.03, y: 0.22},
    // Right tree
    {x: 0.92, y: 0.28}, {x: 0.86, y: 0.18}, {x: 0.78, y: 0.30},
    {x: 0.95, y: 0.40}, {x: 0.82, y: 0.42}, {x: 0.88, y: 0.48},
  ];
  clusters.forEach(c => {
    const cx = c.x * canvas.width, cy = c.y * canvas.height;
    for (let i = 0; i < 9; i++) {
      const bx = cx + (Math.random() - 0.5) * 40;
      const by = cy + (Math.random() - 0.5) * 28;
      const br = 3 + Math.random() * 5;
      const bg = ctx.createRadialGradient(bx, by, 0, bx, by, br);
      bg.addColorStop(0, 'rgba(255,235,245,0.9)');
      bg.addColorStop(0.5, 'rgba(249,192,203,0.7)');
      bg.addColorStop(1, 'rgba(220,130,160,0)');
      ctx.beginPath();
      ctx.arc(bx, by, br, 0, Math.PI * 2);
      ctx.fillStyle = bg;
      ctx.fill();
      // center dot
      ctx.beginPath();
      ctx.arc(bx, by, 1.2, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,200,180,0.8)';
      ctx.fill();
    }
  });
}

/* Mist / atmospheric haze */
function drawMist(t) {
  const mistGrad = ctx.createLinearGradient(0, canvas.height * 0.6, 0, canvas.height);
  mistGrad.addColorStop(0, 'rgba(180,80,100,0)');
  mistGrad.addColorStop(0.6, `rgba(180,80,100,${0.03 + 0.01 * Math.sin(t * 0.3)})`);
  mistGrad.addColorStop(1, `rgba(100,20,40,${0.15 + 0.04 * Math.sin(t * 0.2)})`);
  ctx.fillStyle = mistGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

/* Main loop */
let animT = 0;
function loop() {
  animT += 0.016;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBg();
  drawStars(animT);
  drawMoon();
  drawTrees();
  drawBlossoms();
  petals.forEach(p => { p.update(); p.draw(); });
  drawGroundPetals();
  drawMist(animT);
  requestAnimationFrame(loop);
}
loop();

/* ═══════════════════════════════════════════════════════════════
   WEB AUDIO — GENERATIVE PIANO
═══════════════════════════════════════════════════════════════ */
let audioCtx, masterGain, pianoPlaying = false;

const melody = [
  // C major pentatonic — dreamy arpeggio
  261.63, 329.63, 392.00, 523.25, 392.00, 329.63,
  293.66, 369.99, 440.00, 587.33, 440.00, 369.99,
  246.94, 311.13, 392.00, 493.88, 392.00, 311.13,
  261.63, 329.63, 392.00, 523.25, 659.25, 523.25
];

const bassNotes = [130.81, 146.83, 123.47, 130.81];

function piano(freq, when, duration, gain = 0.12) {
  const osc = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();

  osc.type = 'triangle';
  osc.frequency.setValueAtTime(freq, when);
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(2000, when);
  filter.Q.setValueAtTime(0.5, when);

  gainNode.gain.setValueAtTime(0, when);
  gainNode.gain.linearRampToValueAtTime(gain, when + 0.02);
  gainNode.gain.exponentialRampToValueAtTime(gain * 0.5, when + duration * 0.3);
  gainNode.gain.exponentialRampToValueAtTime(0.001, when + duration);

  // Harmonics for realism
  const osc2 = audioCtx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(freq * 2, when);
  const gainNode2 = audioCtx.createGain();
  gainNode2.gain.setValueAtTime(0, when);
  gainNode2.gain.linearRampToValueAtTime(gain * 0.08, when + 0.01);
  gainNode2.gain.exponentialRampToValueAtTime(0.001, when + duration * 0.4);

  osc.connect(filter); filter.connect(gainNode); gainNode.connect(masterGain);
  osc2.connect(gainNode2); gainNode2.connect(masterGain);

  osc.start(when); osc.stop(when + duration + 0.1);
  osc2.start(when); osc2.stop(when + duration + 0.1);
}

function scheduleMusic() {
  if (!pianoPlaying || !audioCtx) return;
  const now = audioCtx.currentTime;
  const tempo = 0.52; // seconds per beat

  melody.forEach((freq, i) => {
    piano(freq, now + i * tempo, tempo * 1.3, 0.08);
  });
  bassNotes.forEach((freq, i) => {
    piano(freq, now + i * tempo * 6, tempo * 5, 0.06);
  });
  // Reverb chord pad
  [261.63, 329.63, 392.00].forEach(f => {
    piano(f, now, melody.length * tempo + 2, 0.025);
  });

  setTimeout(scheduleMusic, melody.length * tempo * 1000 - 500);
}

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.setValueAtTime(0.7, audioCtx.currentTime);

  // Reverb convolver (simple delay-based)
  const reverb = audioCtx.createConvolver();
  const rate = audioCtx.sampleRate;
  const len = rate * 2.5;
  const buf = audioCtx.createBuffer(2, len, rate);
  for (let c = 0; c < 2; c++) {
    const d = buf.getChannelData(c);
    for (let i = 0; i < len; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.2);
    }
  }
  reverb.buffer = buf;
  const dryGain = audioCtx.createGain(); dryGain.gain.value = 0.65;
  const wetGain = audioCtx.createGain(); wetGain.gain.value = 0.35;
  masterGain.connect(dryGain); dryGain.connect(audioCtx.destination);
  masterGain.connect(reverb); reverb.connect(wetGain); wetGain.connect(audioCtx.destination);
}

function toggleMusic() {
  if (!pianoPlaying) {
    initAudio();
    audioCtx.resume();
    pianoPlaying = true;
    document.getElementById('musicToggle').textContent = '🔇';
    scheduleMusic();
  } else {
    pianoPlaying = false;
    document.getElementById('musicToggle').textContent = '🎹';
    if (masterGain) masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1);
    setTimeout(() => {
      if (!pianoPlaying && masterGain) masterGain.gain.setValueAtTime(0.7, audioCtx.currentTime);
    }, 1200);
  }
}

document.getElementById('musicToggle').addEventListener('click', toggleMusic);

/* Page flip sound via Web Audio */
function playFlipSound() {
  if (!audioCtx) return;
  const noise = audioCtx.createBufferSource();
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.18, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) {
    d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 1.5) * 0.25;
  }
  noise.buffer = buf;
  const filt = audioCtx.createBiquadFilter();
  filt.type = 'bandpass';
  filt.frequency.setValueAtTime(3000, audioCtx.currentTime);
  filt.Q.value = 0.8;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.6, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
  noise.connect(filt); filt.connect(g); g.connect(audioCtx.destination);
  noise.start(); noise.stop(audioCtx.currentTime + 0.2);
}

/* ═══════════════════════════════════════════════════════════════
   BUILD NOTEBOOK PAGES
═══════════════════════════════════════════════════════════════ */
let currentPage = 0; // 0 = cover
const totalPages = pages.length; // 7

function buildSpiral() {
  const spiral = document.getElementById('spiral');
  const count = 18;
  for (let i = 0; i < count; i++) {
    const r = document.createElement('div');
    r.className = 'spiral-ring';
    spiral.appendChild(r);
  }
}

function buildPages() {
  const container = document.getElementById('bookContainer');
  pages.forEach((page, i) => {
    const el = document.createElement('div');
    el.className = 'book-page';
    el.id = `page-${i}`;
    el.style.zIndex = totalPages - i;

    el.innerHTML = `
      <div class="page-front">
        ${buildPageFront(page, i)}
      </div>
      <div class="page-back">
        <div class="page-texture">
          <div class="page-content">
            <div class="page-date" style="color:rgba(160,100,90,0.5);">— ✦ —</div>
          </div>
          <div class="page-number">${i}</div>
        </div>
      </div>
    `;
    container.appendChild(el);
  });
}

function buildPageFront(page, i) {
  if (page.type === 'cover') {
    return `
      <div class="cover-page-content">
        <div class="cover-inner-border"></div>
        <div class="corner-ornament co-tl" style="position:absolute;top:28px;left:28px;width:36px;height:36px;">
          <svg viewBox="0 0 32 32"><path d="M2,30 L2,2 L30,2" fill="none" stroke="rgba(201,169,110,0.5)" stroke-width="1.5"/><circle cx="2" cy="2" r="2" fill="rgba(201,169,110,0.5)"/></svg>
        </div>
        <div class="corner-ornament co-tr" style="position:absolute;top:28px;right:28px;width:36px;height:36px;transform:scaleX(-1);">
          <svg viewBox="0 0 32 32"><path d="M2,30 L2,2 L30,2" fill="none" stroke="rgba(201,169,110,0.5)" stroke-width="1.5"/><circle cx="2" cy="2" r="2" fill="rgba(201,169,110,0.5)"/></svg>
        </div>
        <div class="corner-ornament co-bl" style="position:absolute;bottom:28px;left:28px;width:36px;height:36px;transform:scaleY(-1);">
          <svg viewBox="0 0 32 32"><path d="M2,30 L2,2 L30,2" fill="none" stroke="rgba(201,169,110,0.5)" stroke-width="1.5"/><circle cx="2" cy="2" r="2" fill="rgba(201,169,110,0.5)"/></svg>
        </div>
        <div class="corner-ornament co-br" style="position:absolute;bottom:28px;right:28px;width:36px;height:36px;transform:scale(-1);">
          <svg viewBox="0 0 32 32"><path d="M2,30 L2,2 L30,2" fill="none" stroke="rgba(201,169,110,0.5)" stroke-width="1.5"/><circle cx="2" cy="2" r="2" fill="rgba(201,169,110,0.5)"/></svg>
        </div>
        <div class="cover-text-block">
          <div class="cp-eyebrow">A Private Journal</div>
          <div class="cp-title">Romisaa</div>
          <span class="cp-heart-line">♥</span>
          <div class="cp-subtitle">These pages hold what words alone can barely carry — every feeling, every whisper of love, written only for you.</div>
        </div>
      </div>
    `;
  }

  const stickersHtml = (page.stickers || []).map(s => {
    const pos = Object.entries(s).filter(([k]) => k !== 'emoji' && k !== 'rot').map(([k, v]) => `${k}:${v}`).join(';');
    return `<div class="sticker" style="${pos};transform:rotate(${s.rot})">${s.emoji}</div>`;
  }).join('');

  const bodyContent = page.letter
    ? `<div class="letter-envelope">${page.body}</div>`
    : `<div class="page-body">${page.body}</div>`;

  return `
    <div class="page-texture">
      ${page.watercolor ? '<div class="watercolor-bg"></div>' : ''}
      ${stickersHtml}
      <div class="page-content">
        <div class="page-date">${page.date}</div>
        <div class="page-heading">${page.heading}</div>
        ${bodyContent}
      </div>
      <div class="page-number">${i}</div>
      ${page.seal ? '<div class="wax-seal" style="bottom:28px;right:26px;">♥</div>' : ''}
    </div>
  `;
}

/* ═══════════════════════════════════════════════════════════════
   PAGE FLIP LOGIC
═══════════════════════════════════════════════════════════════ */
function updateNav() {
  const labels = ['Cover', 'Page I', 'Page II', 'Page III', 'Page IV', 'Page V', 'Page VI'];
  document.getElementById('pageIndicatorPill').textContent = labels[currentPage] || `Page ${currentPage}`;
  // Show/hide tap zones
  document.getElementById('tapLeft').classList.toggle('active', currentPage > 0);
  document.getElementById('tapRight').classList.toggle('active', currentPage < totalPages - 1);
  // Dim hints at edges
  document.getElementById('hintLeft').style.opacity = currentPage > 0 ? '' : '0';
  document.getElementById('hintRight').style.opacity = currentPage < totalPages - 1 ? '' : '0';
}

function spawnRipple(x, y) {
  const r = document.createElement('div');
  r.className = 'tap-ripple';
  r.style.left = x + 'px';
  r.style.top = y + 'px';
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 600);
}

function flipPage(dir) {
  if (!audioCtx) { initAudio(); }
  const newPage = currentPage + dir;
  if (newPage < 0 || newPage >= totalPages) return;

  // Flash glow
  const glow = document.getElementById('flipGlow');
  glow.classList.remove('flash');
  void glow.offsetWidth;
  glow.classList.add('flash');

  playFlipSound();

  if (dir === 1) {
    // flip current page away
    const el = document.getElementById(`page-${currentPage}`);
    if (el) {
      el.classList.add('flipped');
      el.style.zIndex = totalPages + currentPage;
    }
  } else {
    // un-flip the page we're going back to
    const el = document.getElementById(`page-${newPage}`);
    if (el) {
      el.classList.remove('flipped');
      el.style.zIndex = totalPages - newPage;
    }
  }

  currentPage = newPage;
  updateNav();
}

/* ═══════════════════════════════════════════════════════════════
   OPEN DIARY ANIMATION
═══════════════════════════════════════════════════════════════ */
function openDiary() {
  // start music
  initAudio();
  pianoPlaying = true;
  document.getElementById('musicToggle').textContent = '🔇';
  scheduleMusic();

  // cover flings open (3D rotate for fun)
  const enterDiary = document.getElementById('enterDiary');
  enterDiary.style.animation = 'none';
  enterDiary.style.transition = 'transform 1.2s cubic-bezier(0.23, 1, 0.32, 1), filter 1.2s ease';
  enterDiary.style.transform = 'rotateY(-180deg) rotateX(8deg) scale(0.7) translateZ(-60px)';
  enterDiary.style.filter = 'drop-shadow(0 30px 60px rgba(200,90,120,0.6)) blur(2px)';

  setTimeout(() => {
    document.getElementById('enterScreen').classList.add('fade-out');
  }, 400);

  setTimeout(() => {
    document.getElementById('enterScreen').style.display = 'none';
    document.getElementById('diaryScene').classList.add('visible');
    document.getElementById('pageIndicatorPill').classList.add('visible');
    document.getElementById('hintLeft').classList.add('visible');
    document.getElementById('hintRight').classList.add('visible');
    document.getElementById('musicToggle').classList.add('shown');
    updateNav();
  }, 2000);
}

/* Tap zones */
document.getElementById('tapRight').addEventListener('click', e => {
  spawnRipple(e.clientX, e.clientY);
  flipPage(1);
});
document.getElementById('tapLeft').addEventListener('click', e => {
  spawnRipple(e.clientX, e.clientY);
  flipPage(-1);
});

/* Keyboard nav */
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') flipPage(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') flipPage(-1);
});

/* Touch swipe (for diagonal/fast swipes) */
let touchX = 0;
document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 60) {
    spawnRipple(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
    flipPage(dx < 0 ? 1 : -1);
  }
});

/* Init */
buildSpiral();
buildPages();
</script>
</body>
</html>
